name: Release

# A published release republishes the build the tagged commit already produced on
# main (build/<sha>/ in R2) — no rebuild — and deploys the Worker + viewer. The
# build pipeline lives in ci.yml; release a commit that was built on main.
on:
  release:
    types: [published]

env:
  R2_BUCKET: ${{ secrets.R2_BUCKET }}
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: auto
  AWS_ENDPOINT_URL: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com

jobs:
  # Promote build/<sha>/ → the served prefix (server-side copy, no rebuild).
  publish-r2:
    runs-on: ubuntu-latest
    steps:
      - name: Promote build/${{ github.sha }} → bathymetry/
        run: |
          if ! aws s3 ls "s3://$R2_BUCKET/build/${{ github.sha }}/manifest.json" >/dev/null 2>&1; then
            echo "::error::No build at build/${{ github.sha }}/ — release a commit that was built on main."
            exit 1
          fi
          aws s3 cp "s3://$R2_BUCKET/build/${{ github.sha }}/" \
            "s3://$R2_BUCKET/bathymetry/" --recursive --exclude 'contour-shards/*'

  # Deploy the serving Worker (reads bathymetry/ from the same R2 bucket).
  deploy-worker:
    needs: publish-r2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: wrangler deploy
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          npm ci
          npx wrangler deploy --var "TILES_PREFIX:bathymetry/"

  # Build the viewer (pointed at the Worker) and deploy it to GitHub Pages.
  deploy-pages:
    runs-on: ubuntu-latest
    permissions: { pages: write, id-token: write, contents: read }
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency: { group: pages, cancel-in-progress: false }
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - name: Build viewer
        env:
          VITE_TILES_BASE: https://tiles.openwaters.io
        run: |
          npm ci
          npm run build
      - uses: actions/upload-pages-artifact@v4
        with: { path: dist }
      - id: deployment
        uses: actions/deploy-pages@v5
